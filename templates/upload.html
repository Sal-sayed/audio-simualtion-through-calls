<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload Contacts</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <style>
    body { background: #0f172a; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .upload-box { background: #1e293b; border-radius: 16px; padding: 40px; max-width: 480px; width: 100%; color: #fff; text-align: center; }
    h2 { margin-bottom: 8px; }
    p  { color: #94a3b8; font-size: 14px; margin-bottom: 24px; }
    input[type=file] { width: 100%; padding: 12px; border: 2px dashed #334155; border-radius: 8px; background: #0f172a; color: #fff; cursor: pointer; margin-bottom: 16px; }
    button { background: #38a169; color: #fff; border: none; padding: 12px 32px; border-radius: 8px; font-size: 16px; cursor: pointer; width: 100%; }
    button:hover { background: #2f855a; }
    .msg { margin-top: 16px; padding: 12px; border-radius: 8px; font-size: 14px; }
    .msg.success { background: #14532d; color: #86efac; }
    .msg.error   { background: #3b1f1f; color: #fca5a5; }
    .links { margin-top: 20px; text-align: left; }
    .links a { display: block; color: #68d391; font-size: 14px; margin: 6px 0; }
    pre { background: #0f172a; padding: 10px; border-radius: 8px; font-size: 12px; color: #94a3b8; text-align: left; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="upload-box">
    <h2>📁 Upload Contacts CSV</h2>
    <p>CSV must have columns: <strong>Name</strong>, <strong>Phone</strong></p>
    <pre>Name,Phone
Aakash,9198XXXXXXX
Priya,9197XXXXXXX</pre>

    <form id="uploadForm" enctype="multipart/form-data">
      <input type="file" name="csv_file" accept=".csv" required />
      <button type="submit">Upload & Process</button>
    </form>

    <div id="message"></div>

    <div class="links">
      <a href="/dashboard">📊 View Dashboard</a>
      <a href="/contacts">🔗 View Generated Links (JSON)</a>
    </div>
  </div>

  <script>
    document.getElementById("uploadForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const form = e.target;
      const data = new FormData(form);
      const res  = await fetch("/upload", { method: "POST", body: data });
      const json = await res.json();
      const div  = document.getElementById("message");
      div.className = "msg " + (res.ok ? "success" : "error");
      div.textContent = json.message;
    });
  </script>
</body>
</html>
